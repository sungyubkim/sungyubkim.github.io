name: Deploy site

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install RenderCV
        run: uv tool install 'rendercv[full]==2.8.*'
      - name: Install poppler-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils
      - name: Render CV PDF
        run: |
          rendercv render _data/cv.yml \
            --output-folder "$GITHUB_WORKSPACE/assets/rendercv/rendercv_output"
      - name: Verify PDF content integrity
        run: |
          PDF=$(ls assets/rendercv/rendercv_output/*.pdf | head -1)
          test -n "$PDF" || { echo "No PDF produced"; exit 1; }
          echo "Verifying: $PDF"
          pdftotext "$PDF" - > /tmp/cv.txt
          MISSING=0
          for needle in "sungyub.kim@mli.kaist.ac.kr" "Eunho Yang" "LANTERN" "Continual Learning" "Megatron-LM"; do
            if ! grep -qF "$needle" /tmp/cv.txt; then
              echo "MISSING: $needle"
              MISSING=1
            fi
          done
          [ $MISSING -eq 0 ]
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Install and Build
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          export JEKYLL_ENV=production
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
